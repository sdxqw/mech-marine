name: Deploy Docker Next.js Template

on:
  push:
    branches:
      -  'master'
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository (utile se vuoi usare scripts locali)
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Deploy via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            # 💡 Cartella del progetto sul server
            cd ${{ secrets.DEPLOY_PATH }}

            # 🔄 Aggiorna repo
            git fetch origin master
            git reset --hard origin/master

            # 🧹 Pulizia vecchi container e immagini inutilizzate
            docker compose down --remove-orphans
            docker image prune -f

            # 🛠️ Build pulita delle immagini
            docker compose build --pull --no-cache

            # 🚀 Avvio nuovo container
            docker compose up -d

            echo "✅ Deploy completato correttamente"
